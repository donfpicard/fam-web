<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <title>FAM icon — Free America Movement</title>
  <desc>Minimal icon for the Free America Movement. For use as favicon, social media avatar, embroidered patch, and pin.</desc>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="245" fill="#3A4DB5"/>
  <circle cx="250" cy="250" r="228" fill="none" stroke="white" stroke-width="2" opacity="0.12"/>

  <!-- Tricolor arc — tight to top -->
  <path d="M 44 178 A 245 245 0 0 1 116 60" fill="none" stroke="#C0392B" stroke-width="20" stroke-linecap="round"/>
  <path d="M 116 60 A 245 245 0 0 1 384 60" fill="none" stroke="#8B7FE8" stroke-width="20" stroke-linecap="round"/>
  <path d="M 384 60 A 245 245 0 0 1 456 178" fill="none" stroke="#2471A3" stroke-width="20" stroke-linecap="round"/>

  <!-- FAM -->
  <text x="250" y="318" text-anchor="middle"
    font-family="'Trebuchet MS', sans-serif"
    font-size="188" font-weight="700"
    fill="white"
    letter-spacing="6">FAM</text>
</svg>
